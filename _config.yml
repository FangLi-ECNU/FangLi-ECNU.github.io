# ============================================================
# GitHub Pages / Jekyll Configuration
# For Fang Li's Academic Homepage
# ============================================================

title: Fang Li | ECNU
email: fli@math.ecnu.edu.cn
description: >-
  Fang Li (黎芳), Professor at East China Normal University.
  Research in image processing, computer vision, machine learning, deep learning.
baseurl: ""
url: "https://fangli-ecnu.github.io/"

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Navigation header
header_pages:
  - biography.md
  - publications.md
  - students.md
  - teaching.md
  - funds.md
  - links.md

# Minima theme customizations
minima:
  skin: classic
  social_links:
    - platform: google_scholar
      user_url: "https://scholar.google.com/citations?user=2_8WX68AAAAJ&hl=en"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

# Markdown processing
markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
